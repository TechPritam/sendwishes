<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1f2"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <rect width="900" height="900" rx="80" fill="url(#bg)"/>

  <g opacity="0.16" fill="#fb7185">
    <circle cx="140" cy="160" r="38"/>
    <circle cx="780" cy="220" r="28"/>
    <circle cx="720" cy="720" r="42"/>
    <circle cx="200" cy="760" r="30"/>
  </g>

  <g transform="translate(450 420)">
    <path d="M0 190C-160 80-240 10-240-80c0-75 55-130 130-130 55 0 92 26 110 55 18-29 55-55 110-55 75 0 130 55 130 130 0 90-80 160-240 270z" fill="url(#heart)"/>
  </g>

  <text x="450" y="145" text-anchor="middle" font-size="52" font-family="ui-sans-serif, system-ui" fill="#881337" opacity="0.95">A little puzzle</text>
  <text x="450" y="205" text-anchor="middle" font-size="28" font-family="ui-sans-serif, system-ui" fill="#9f1239" opacity="0.8">with a sweet surprise inside</text>

  <g transform="translate(450 670)" opacity="0.9">
    <rect x="-280" y="-70" width="560" height="140" rx="40" fill="#ffffff"/>
    <rect x="-280" y="-70" width="560" height="140" rx="40" fill="none" stroke="#fecdd3" stroke-width="6"/>
    <text x="0" y="-6" text-anchor="middle" font-size="34" font-family="ui-sans-serif, system-ui" fill="#18181b">Put the pieces together…</text>
    <text x="0" y="44" text-anchor="middle" font-size="22" font-family="ui-sans-serif, system-ui" fill="#52525b">and reveal the message below ♥</text>
  </g>
</svg>
